<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnQuest - Modern Learning Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            --secondary-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --success-color: #4caf50;
            --error-color: #f44336;
            --warning-color: #ffc107;
        }

        /* ===== LIGHT MODE ===== */
        body.light-mode {
            --bg-primary: #f8f9fa;
            --bg-secondary: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --border-color: rgba(0, 0, 0, 0.1);
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.3);
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        /* ===== DARK MODE ===== */
        body.dark-mode {
            --bg-primary: #0a0e27;
            --bg-secondary: #1a1f3a;
            --text-primary: #e0e0e0;
            --text-secondary: #b0b0b0;
            --border-color: rgba(255, 255, 255, 0.1);
            --glass-bg: rgba(26, 31, 58, 0.6);
            --glass-border: rgba(255, 255, 255, 0.15);
            background: linear-gradient(135deg, #0f0f1e 0%, #2a2a5a 100%);
        }

        body {
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 1.5em;
            z-index: 1000;
            transition: all 0.3s ease;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .theme-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
        }

        .container {
            width: 100%;
            max-width: 950px;
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            border: 2px solid var(--glass-border);
            border-radius: 40px;
            padding: 60px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            animation: slideIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== SCREENS ===== */
        .screen {
            display: none;
            animation: fadeIn 0.5s ease-in;
        }

        .screen.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* ===== START SCREEN ===== */
        .start-screen h1 {
            font-size: 4em;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            margin-bottom: 15px;
            animation: popIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes popIn {
            0% {
                opacity: 0;
                transform: scale(0.3) rotateY(180deg);
            }
            100% {
                opacity: 1;
                transform: scale(1) rotateY(0deg);
            }
        }

        .start-screen p {
            text-align: center;
            color: var(--text-secondary);
            font-size: 1.2em;
            margin-bottom: 60px;
            font-weight: 500;
        }

        .emoji-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            font-size: 3em;
        }

        .emoji-item {
            animation: float 3s ease-in-out infinite;
        }

        .emoji-item:nth-child(1) { animation-delay: 0s; }
        .emoji-item:nth-child(2) { animation-delay: 0.2s; }
        .emoji-item:nth-child(3) { animation-delay: 0.4s; }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotateZ(0deg); }
            50% { transform: translateY(-25px) rotateZ(5deg); }
        }

        /* ===== BUTTONS ===== */
        .btn {
            padding: 16px 45px;
            margin: 10px;
            font-size: 1.1em;
            font-weight: 700;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(10px);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-primary {
            background: var(--primary-gradient);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 45px rgba(102, 126, 234, 0.4);
            border-color: rgba(255, 255, 255, 0.6);
        }

        .btn-secondary {
            background: var(--glass-bg);
            color: var(--text-primary);
            border: 2px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--bg-secondary);
            transform: translateY(-3px);
            border-color: var(--text-primary);
        }

        .btn-subject {
            width: 100%;
            padding: 25px;
            margin: 15px 0;
            font-size: 1.4em;
            text-align: left;
            font-weight: 600;
            background: var(--glass-bg);
            border: 2px solid var(--border-color);
            border-radius: 25px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.4s ease;
        }

        .btn-subject:hover {
            background: var(--bg-secondary);
            border-color: var(--text-primary);
            transform: translateX(12px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
        }

        .btn-topic {
            width: 100%;
            padding: 16px;
            margin: 10px 0;
            background: var(--glass-bg);
            border: 2px solid var(--border-color);
            border-radius: 18px;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 1.1em;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-topic:hover {
            background: var(--bg-secondary);
            border-color: var(--text-primary);
            transform: translateX(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .btn-answer {
            width: 100%;
            padding: 16px;
            margin: 10px 0;
            background: var(--glass-bg);
            border: 2px solid var(--border-color);
            border-radius: 18px;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 1.1em;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .btn-answer:hover {
            background: var(--bg-secondary);
            border-color: var(--text-primary);
            transform: translateX(8px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .btn-answer.selected {
            background: rgba(102, 126, 234, 0.3);
            border-color: #667eea;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.4);
        }

        .btn-answer.correct {
            background: rgba(76, 175, 80, 0.2);
            border-color: #4caf50;
            color: #4caf50;
            animation: correctAnswer 0.6s ease;
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.4);
        }

        .btn-answer.incorrect {
            background: rgba(244, 67, 54, 0.2);
            border-color: #f44336;
            color: #f44336;
            animation: shake 0.5s ease;
            box-shadow: 0 0 20px rgba(244, 67, 54, 0.4);
        }

        @keyframes correctAnswer {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* ===== HEADINGS ===== */
        .screen h2 {
            font-size: 2.2em;
            text-align: center;
            margin-bottom: 40px;
            font-weight: 700;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .button-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        /* ===== QUIZ SCREEN ===== */
        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding: 25px;
            background: var(--glass-bg);
            border: 2px solid var(--border-color);
            border-radius: 25px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .quiz-progress {
            color: var(--text-primary);
            font-size: 1.2em;
            font-weight: 700;
        }

        .stats-container {
            display: flex;
            gap: 30px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: 900;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            font-size: 0.9em;
            color: var(--text-secondary);
            margin-top: 5px;
            font-weight: 600;
        }

        .timer {
            font-size: 2.2em;
            font-weight: 900;
            padding: 12px 28px;
            border-radius: 50px;
            background: var(--glass-bg);
            border: 3px solid var(--border-color);
            transition: all 0.3s ease;
            color: var(--text-primary);
        }

        .timer.green {
            color: #4caf50;
            border-color: #4caf50;
            background: rgba(76, 175, 80, 0.1);
        }

        .timer.yellow {
            color: #ffc107;
            border-color: #ffc107;
            background: rgba(255, 193, 7, 0.1);
            animation: pulse 0.8s infinite;
        }

        .timer.red {
            color: #f44336;
            border-color: #f44336;
            background: rgba(244, 67, 54, 0.1);
            animation: pulse 0.4s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .question-container {
            background: var(--glass-bg);
            border: 2px solid var(--border-color);
            border-radius: 30px;
            padding: 40px;
            margin-bottom: 30px;
            backdrop-filter: blur(20px);
        }

        .question-text {
            color: var(--text-primary);
            font-size: 1.5em;
            font-weight: 700;
            margin-bottom: 35px;
            line-height: 1.8;
        }

        .answers-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* ===== RESULT SCREEN ===== */
        .result-container {
            text-align: center;
        }

        .result-title {
            font-size: 2.8em;
            margin: 30px 0;
            font-weight: 800;
            animation: popIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .result-emoji {
            font-size: 5em;
            margin: 40px 0;
            animation: bounceIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes bounceIn {
            0% {
                opacity: 0;
                transform: scale(0) translateY(50px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .stars {
            font-size: 4.5em;
            margin: 35px 0;
            letter-spacing: 20px;
            animation: starBurst 0.8s ease;
        }

        .star {
            display: inline-block;
            animation: starPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .star:nth-child(1) { animation-delay: 0s; }
        .star:nth-child(2) { animation-delay: 0.2s; }
        .star:nth-child(3) { animation-delay: 0.4s; }

        @keyframes starPop {
            0% {
                opacity: 0;
                transform: scale(0) rotate(-180deg);
            }
            100% {
                opacity: 1;
                transform: scale(1) rotate(0deg);
            }
        }

        @keyframes starBurst {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        .result-stats {
            background: var(--glass-bg);
            border: 2px solid var(--border-color);
            border-radius: 25px;
            padding: 35px;
            margin: 35px 0;
        }

        .result-stat {
            font-size: 1.3em;
            margin: 18px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            color: var(--text-primary);
        }

        .result-stat-value {
            font-size: 1.6em;
            font-weight: 900;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .progress-bar {
            width: 100%;
            height: 12px;
            background: var(--border-color);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary-gradient);
            border-radius: 10px;
            transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .container {
                padding: 30px;
            }

            .start-screen h1 {
                font-size: 2.8em;
            }

            .quiz-header {
                flex-direction: column;
                gap: 15px;
            }

            .stats-container {
                width: 100%;
                justify-content: space-around;
            }

            .timer {
                font-size: 1.8em;
            }

            .question-text {
                font-size: 1.3em;
            }

            .question-container {
                padding: 25px;
            }

            .result-title {
                font-size: 2.2em;
            }

            .stars {
                font-size: 3.5em;
                letter-spacing: 12px;
            }

            .btn {
                padding: 14px 35px;
                font-size: 1em;
            }
        }

        .achievement-badge {
            display: inline-block;
            background: linear-gradient(135deg, #ffd700, #ffa500);
            border-radius: 50%;
            padding: 15px;
            font-size: 2.5em;
            margin: 15px 10px;
            animation: rotate 10s linear infinite;
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3);
        }

        @keyframes rotate {
            0% { transform: rotateZ(0deg); }
            100% { transform: rotateZ(360deg); }
        }

        .feedback-message {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            border-radius: 15px;
            font-weight: 600;
            font-size: 1.1em;
            animation: slideInUp 0.5s ease;
        }

        .feedback-correct {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            border: 2px solid #4caf50;
        }

        .feedback-incorrect {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
            border: 2px solid #f44336;
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .back-btn {
            margin-top: 30px;
        }

        .next-btn-container {
            display: flex;
            justify-content: center;
            margin-top: 30px;
        }

        #nextBtn {
            display: none;
        }

        #nextBtn.show {
            display: inline-block;
        }
    </style>
</head>
<body class="dark-mode">
    <!-- THEME TOGGLE -->
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙</button>

    <div class="container">
        <!-- ===== START SCREEN ===== -->
        <div class="screen active" id="startScreen">
            <h1>🎓 LearnQuest</h1>
            <p>Lerne mit modernem Design und Spaß! Teste dein Wissen in verschiedenen Fächern.</p>
            <div class="emoji-group">
                <span class="emoji-item">📚</span>
                <span class="emoji-item">✨</span>
                <span class="emoji-item">🚀</span>
            </div>
            <div class="button-group" style="justify-content: center;">
                <button class="btn btn-primary" onclick="goToSubjectSelection()">🚀 Jetzt starten!</button>
            </div>
        </div>

        <!-- ===== SUBJECT SELECTION SCREEN ===== -->
        <div class="screen" id="subjectScreen">
            <h2>📚 Wähle dein Fach</h2>
            <button class="btn-subject" onclick="selectSubject('mathe')">🧮 Mathematik</button>
            <button class="btn-subject" onclick="selectSubject('englisch')">🌍 Englisch</button>
            <button class="btn-subject" onclick="selectSubject('geschichte')">🏛️ Geschichte</button>
            <div class="button-group">
                <button class="btn btn-secondary" onclick="goToStart()">← Zurück</button>
            </div>
        </div>

        <!-- ===== TOPIC SELECTION SCREEN ===== -->
        <div class="screen" id="topicScreen">
            <h2 id="topicScreenTitle"></h2>
            <div id="topicButtonsContainer"></div>
            <div class="button-group">
                <button class="btn btn-secondary" onclick="goToSubjectSelection()">← Zurück</button>
            </div>
        </div>

        <!-- ===== QUIZ SCREEN ===== -->
        <div class="screen" id="quizScreen">
            <div class="quiz-header">
                <div class="quiz-progress">
                    <span id="currentQuestion">1</span> / <span id="totalQuestions">15</span>
                </div>
                <div class="stats-container">
                    <div class="stat-item">
                        <div class="stat-value" id="xpDisplay">0</div>
                        <div class="stat-label">⚡ XP</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="streakDisplay">0</div>
                        <div class="stat-label">🔥 Streak</div>
                    </div>
                </div>
                <div class="timer" id="timer">30s</div>
            </div>
            <div class="question-container">
                <div class="question-text" id="questionText"></div>
                <div class="answers-container" id="answersContainer"></div>
                <div id="feedbackMessage"></div>
            </div>
            <div class="next-btn-container">
                <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">Weiter →</button>
            </div>
        </div>

        <!-- ===== RESULT SCREEN ===== -->
        <div class="screen" id="resultScreen">
            <div class="result-container">
                <h2>🎉 Quiz abgeschlossen!</h2>
                <div class="result-emoji" id="resultEmoji">🎊</div>
                <div class="result-title" id="resultTitle">Hervorragend!</div>
                <div class="stars" id="starsContainer"></div>
                <div class="result-stats">
                    <div class="result-stat">
                        <span>✅ Richtig beantwortet:</span>
                        <span class="result-stat-value" id="resultCorrect">0</span>
                    </div>
                    <div class="result-stat">
                        <span>⚡ Punkte erhalten:</span>
                        <span class="result-stat-value" id="resultPoints">0</span>
                    </div>
                    <div class="result-stat">
                        <span>📊 Erfolgsquote:</span>
                        <span class="result-stat-value" id="resultPercentage">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                </div>
                <div id="achievementBadges"></div>
                <div class="button-group">
                    <button class="btn btn-primary" onclick="goToStart()">← Zur Startseite</button>
                    <button class="btn btn-secondary" onclick="goToSubjectSelection()">🔄 Anderes Fach</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ===== QUIZ DATA =====
        const quizData = {
            mathe: {
                'Quadratische Funktionen': [
                    { question: 'Welche ist die Scheitelpunktform einer quadratischen Funktion?', answers: ['y = ax² + bx + c', 'y = a(x - h)² + k', 'y = ax + b', 'y = mx²'], correct: 1 },
                    { question: 'Der Scheitelpunkt der Funktion f(x) = (x - 2)² + 3 ist...?', answers: ['(2, 3)', '(-2, 3)', '(2, -3)', '(-2, -3)'], correct: 0 },
                    { question: 'Wie viele Nullstellen kann eine quadratische Funktion maximal haben?', answers: ['1', '2', '3', '4'], correct: 1 },
                    { question: 'Was ist das Symbol a in y = a(x - h)² + k?', answers: ['Die Verschiebung nach rechts', 'Die Streckung/Stauchung und Öffnungsrichtung', 'Die Verschiebung nach oben', 'Die Nullstelle'], correct: 1 },
                    { question: 'Die Parabel y = -2x² ist nach... geöffnet?', answers: ['oben', 'unten', 'links', 'rechts'], correct: 1 },
                    { question: 'Welche Funktion hat einen Scheitelpunkt bei (0, 0)?', answers: ['y = x² + 1', 'y = (x - 1)²', 'y = x²', 'y = x² - 1'], correct: 2 },
                    { question: 'Wie lautet die pq-Formel?', answers: ['x = -p/2 ± √((p/2)² - q)', 'x = p ± q', 'x = √(p² - q²)', 'x = p/q'], correct: 0 },
                    { question: 'Die Diskriminante ist...?', answers: ['Das Produkt der Koeffizienten', 'Der Ausdruck unter der Wurzel', 'Der Scheitelpunkt', 'Die Parabelöffnung'], correct: 1 },
                    { question: 'Eine quadratische Funktion hat eine positive Diskriminante. Wie viele Nullstellen hat sie?', answers: ['Keine', 'Eine', 'Zwei', 'Drei'], correct: 2 },
                    { question: 'Was ist die Symmetrieachse einer Parabel y = a(x - h)² + k?', answers: ['y = k', 'x = h', 'y = h', 'x = k'], correct: 1 },
                    { question: 'Wie transformiert man y = x² zu y = (x + 3)²?', answers: ['3 Einheiten nach rechts', '3 Einheiten nach links', '3 Einheiten nach oben', '3 Einheiten nach unten'], correct: 1 },
                    { question: 'Bei f(x) = 2(x - 1)² + 5 ist die minimale Höhe...?', answers: ['0', '1', '2', '5'], correct: 3 },
